services:
  redis-node-1:
    image: redis
    container_name: redis-node-1
    command: redis-server --appendonly yes
    ports:
      - "6370:6379"
    volumes:
      - "redis_node_1_data:/data"
    networks:
      - redis-cluster-net

  redis-node-2:
    image: redis
    container_name: redis-node-2
    command: redis-server --appendonly yes
    ports:
      - "6371:6379"
    volumes:
      - "redis_node_2_data:/data"
    networks:
      - redis-cluster-net

  redis-node-3:
    image: redis
    container_name: redis-node-3
    command: redis-server --appendonly yes
    ports:
      - "6372:6379"
    volumes:
      - "redis_node_3_data:/data"
    networks:
      - redis-cluster-net

  redis-node-4:
    image: redis
    container_name: redis-node-4
    command: redis-server --appendonly yes
    ports:
      - "6373:6379"
    volumes:
      - "redis_node_4_data:/data"
    networks:
      - redis-cluster-net

  redis-node-5:
    image: redis
    container_name: redis-node-5
    command: redis-server --appendonly yes
    ports:
      - "6374:6379"
    volumes:
      - "redis_node_5_data:/data"
    networks:
      - redis-cluster-net

networks:
  redis-cluster-net:
    driver: bridge

volumes:
  redis_node_1_data:
  redis_node_2_data:
  redis_node_3_data:
  redis_node_4_data:
  redis_node_5_data:
